name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        service: [student-service, teacher-service, exam-service]
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm test

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build Docker image
        run: docker build -t ${{ matrix.service }}:ci .

  sonarcloud:
    name: SonarCloud (SAST)
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork == false && secrets.SONAR_TOKEN != '' }}
    strategy:
      fail-fast: false
      matrix:
        service: [student-service, teacher-service, exam-service]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json

      - name: Install and test (coverage for Sonar)
        working-directory: ${{ matrix.service }}
        run: |
          npm ci
          npm test

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ${{ matrix.service }}
        continue-on-error: true
