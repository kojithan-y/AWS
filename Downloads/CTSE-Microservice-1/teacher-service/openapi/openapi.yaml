openapi: 3.0.3
info:
  title: Teacher Service API
  description: Teacher profiles; integrates with Student and Exam services (GET /teachers/{id}/summary).
  version: 1.0.0
servers:
  - url: /
    description: Same host (Swagger Try it out)
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: OK
  /teachers:
    get:
      summary: List teachers
      operationId: listTeachers
      responses:
        '200':
          description: OK
    post:
      summary: Create teacher
      operationId: createTeacher
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherCreate'
      responses:
        '201':
          description: Created
        '409':
          description: Duplicate
  /teachers/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get by id
      operationId: getTeacher
      responses:
        '200':
          description: OK
        '404':
          description: Not found
    put:
      summary: Update
      operationId: updateTeacher
      responses:
        '200':
          description: OK
    delete:
      summary: Delete
      operationId: deleteTeacher
      responses:
        '204':
          description: No content
  /teachers/{id}/summary:
    get:
      summary: Integration summary
      operationId: getTeacherSummary
      responses:
        '200':
          description: OK
components:
  schemas:
    TeacherCreate:
      type: object
      required: [teacherId, fullName, email, department]
      properties:
        teacherId:
          type: string
        fullName:
          type: string
        email:
          type: string
          format: email
        department:
          type: string
