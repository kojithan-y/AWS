openapi: 3.0.3
info:
  title: Exam Service API
  description: |
    Exam scheduling and enrolment. Lists by teacher or student id match paths used by
    Teacher and Student services (GET /exams/teacher/{teacherId}, GET /exams/student/{studentId}).
    Configure TEACHER_SERVICE_URL and STUDENT_SERVICE_URL for GET /exams/{id}/summary.
  version: 1.0.0
servers:
  - url: /
    description: Same host (Swagger Try it out)
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: OK
  /exams:
    get:
      summary: List exams
      operationId: listExams
      responses:
        '200':
          description: OK
    post:
      summary: Create exam
      operationId: createExam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExamCreate'
      responses:
        '201':
          description: Created
        '400':
          description: Validation error
        '409':
          description: Duplicate
  /exams/teacher/{teacherId}:
    parameters:
      - name: teacherId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Exams for a teacher (business id)
      operationId: listExamsForTeacher
      responses:
        '200':
          description: OK
  /exams/student/{studentId}:
    parameters:
      - name: studentId
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Exams a student is enrolled in (business id)
      operationId: listExamsForStudent
      responses:
        '200':
          description: OK
  /exams/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Get by id
      operationId: getExam
      responses:
        '200':
          description: OK
        '404':
          description: Not found
    put:
      summary: Update
      operationId: updateExam
      responses:
        '200':
          description: OK
    delete:
      summary: Delete
      operationId: deleteExam
      responses:
        '204':
          description: No content
  /exams/{id}/summary:
    get:
      summary: Exam + peer service integration
      operationId: getExamSummary
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
        '404':
          description: Not found
components:
  schemas:
    ExamCreate:
      type: object
      required: [examId, title, courseCode, teacherId, scheduledAt]
      properties:
        examId:
          type: string
        title:
          type: string
        courseCode:
          type: string
        teacherId:
          type: string
        enrolledStudentIds:
          type: array
          items:
            type: string
        scheduledAt:
          type: string
          format: date-time
        venue:
          type: string
